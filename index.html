<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WebKit Memory Researcher - PS5 v13.00</title>
    <style>
        body { background: #0a0a0a; color: #00d4ff; font-family: 'Consolas', monospace; padding: 20px; }
        #log { 
            background: #000; border: 1px solid #00d4ff; height: 450px; 
            overflow-y: scroll; padding: 15px; margin-bottom: 15px;
            font-size: 13px; color: #00ff00;
        }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { 
            background: #111; color: #00d4ff; border: 1px solid #00d4ff; 
            padding: 12px; cursor: pointer; font-weight: bold;
        }
        button:hover { background: #00d4ff; color: #000; }
        .danger { border-color: #ff4444; color: #ff4444; }
        .danger:hover { background: #ff4444; color: #fff; }
    </style>
</head>
<body>
    <h2>PS5 WebKit Research Tool</h2>
    <div id="log">>> Sistema cargado. Listo para escaneo de memoria...</div>

    <div class="controls">
        <button onclick="Research.sprayBuffers()">1. Spray ArrayBuffers (Stabilize)</button>
        <button onclick="Research.testUAF()">2. Test Use-After-Free (UAF)</button>
        <button onclick="Research.searchLeakedPointers()">3. Search Pointer Leaks</button>
        <button onclick="Research.stressJIT()" class="danger">4. Stress JIT Compiler</button>
        <button onclick="location.reload()">Reiniciar Entorno</button>
    </div>

    <script src="research.js"></script>
</body>
</html>
