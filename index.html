<button onclick="Lab.internalStress()" class="danger">7. INTERNAL SYSTEM STRESS</button>

<script>
// Añade estas funciones dentro de tu objeto 'Lab'
const Lab = {
    // ... (mantén spray, scan800, leakCheck, etc.)

    internalStress: function() {
        this.log("Iniciando estrés interno del sistema...");
        
        // 1. Estrés de CPU mediante Web Workers (si están disponibles)
        try {
            for(let i=0; i<4; i++) {
                const blob = new Blob([`
                    setInterval(() => {
                        let x = 0;
                        for(let i=0; i<1000000; i++) { x += Math.sqrt(i); }
                        postMessage(x);
                    }, 100);
                `], {type: 'text/javascript'});
                const worker = new Worker(URL.createObjectURL(blob));
                worker.onmessage = (e) => {}; // Mantener vivo
            }
            this.log("✓ Workers de CPU activos.");
        } catch(e) { this.log("✗ Workers no soportados."); }

        // 2. Estrés de Audio (obliga al sistema a mezclar canales)
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = ctx.createOscillator();
            oscillator.connect(ctx.destination);
            oscillator.start();
            this.log("✓ Oscilador de audio activo (Sistema ocupado).");
        } catch(e) { this.log("✗ Audio bloqueado."); }

        this.log("CONSEJO: Ahora pulsa UNA VEZ el botón PS para abrir el Control Center.");
        this.log("Muévete por las notificaciones y vuelve aquí para dar al botón 4.");
    },

    // OPTIMIZACIÓN: Modifica tu botón 4 (leakCheck) para que sea más rápido
    leakCheck: async function() {
        this.log("Escaneando integridad (Buscando colisiones)...");
        let anomalies = 0;
        // Solo escaneamos una muestra significativa para no congelar
        for (let idx = 0; idx < this.blobs.length; idx++) {
            let buf = this.blobs[idx];
            // Solo miramos los primeros 1000 valores de cada bloque (muestreo rápido)
            for (let i = 0; i < 1000; i++) {
                if (buf[i] !== 0x41414141 && buf[i] !== 0) {
                    this.log(`!!! COLISIÓN: Bloque ${idx} -> 0x${buf[i].toString(16)}`);
                    anomalies++;
                }
            }
            if (idx % 50 === 0) await new Promise(r => setTimeout(r, 1));
        }
        this.log(anomalies === 0 ? "Memoria estable." : `¡${anomalies} colisiones detectadas!`);
    }
};
</script>
