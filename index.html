<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PS5 Research Lab v3.0 - Integrity Suite</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        #log { 
            background: #000; border: 1px solid #00ff41; height: 400px; 
            overflow-y: scroll; padding: 15px; margin-bottom: 20px;
            white-space: pre-wrap; font-size: 12px; color: #0f0;
            box-shadow: inset 0 0 10px #00ff4133;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { 
            background: #111; color: #00ff41; border: 1px solid #00ff41; 
            padding: 15px; cursor: pointer; font-weight: bold; font-size: 13px;
            text-transform: uppercase;
        }
        button:hover { background: #00ff41; color: #000; }
        .version-tag { color: #444; font-size: 10px; text-align: right; margin-top: 5px; }
        .highlight { color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <h2>🎮 PS5 WEBKIT RESEARCH LAB</h2>
    <div id="log">>> Cargando suite de investigación...</div>

    <div class="grid">
        <button onclick="Lab.spray()">1. HEAP SPRAY (Agresivo)</button>
        <button onclick="Lab.testUAF()">2. UAF PERSISTENCE TEST</button>
        <button onclick="Lab.scan800()">3. SCAN PUNTEROS 0x800</button>
        <button onclick="Lab.leakCheck()">4. INTEGRITY CHECK (Cualquier Leak)</button>
        <button onclick="Lab.jitChaos()">5. JIT OPTIMIZATION CHAOS</button>
        <button onclick="Lab.clearLog()">LIMPIAR LOGS</button>
        <button onclick="location.reload()" style="border-color:#f00; color:#f00;">RECARGAR (LIMPIAR CACHÉ)</button>
    </div>
    
    <div class="version-tag">Build: 2026-04-13_V3.0_INTEGRITY</div>

    <script src="coi-serviceworker.js"></script>

    <script>
        const Lab = {
            blobs: [],

            log: function(msg) {
                const l = document.getElementById('log');
                if(!l) return;
                l.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
                l.scrollTop = l.scrollHeight;
            },

            clearLog: function() {
                document.getElementById('log').textContent = ">> Consola reseteada.\n";
            },

            // 1. Spray: Ocupamos la RAM con el patrón 0x41414141 (AAAA)
            spray: function() {
                this.log("Iniciando Heap Spray de 300MB...");
                try {
                    for(let i=0; i<300; i++) {
                        let b = new Uint32Array(1024 * 256); // 1MB por bloque
                        b.fill(0x41414141); 
                        this.blobs.push(b);
                    }
                    this.log("✓ Spray completado. Memoria bajo presión.");
                } catch(e) { this.log("✗ Fallo en Spray (Límite alcanzado): " + e.message); }
            },

            // 2. Test de persistencia de punteros
            testUAF: function() {
                this.log("Ejecutando Test de persistencia UAF...");
                let obj = { data: new Uint32Array(16).fill(0x1337) };
                let ref = obj; 
                obj = null; 
                
                // Forzamos presión de memoria para activar el GC
                for(let i=0; i<10000; i++) { let junk = { a: i }; }

                if(ref && ref.data[0] === 0x1337) {
                    this.log("✓ INTERESANTE: El objeto persiste tras la recolección.");
                } else {
                    this.log("✗ OBJETO LIMPIADO.");
                }
            },

            // 3. Escaneo asíncrono del rango clásico 0x800
            scan800: async function() {
                this.log("Escaneando direcciones de librerías (0x800...)...");
                let count = 0;
                for (let idx = 0; idx < this.blobs.length; idx++) {
                    let buf = this.blobs[idx];
                    for (let i = 0; i < buf.length; i++) {
                        let val = buf[i];
                        if (val >= 0x80000000 && val <= 0x8FFFFFFF) {
                            this.log(`!!! LEAK ENCONTRADO: Bloque ${idx} -> 0x${val.toString(16)}`);
                            count++;
                        }
                    }
                    // Pausa para evitar el congelamiento de la PS5
                    if (idx % 20 === 0) await new Promise(r => setTimeout(r, 1));
                }
                this.log(count > 0 ? `✓ Escaneo finalizado: ${count} leaks.` : "✗ No se detectaron punteros 0x800.");
            },

            // 4. Escaneo de integridad: Busca CUALQUIER cambio en el patrón
            leakCheck: async function() {
                this.log("Iniciando Escaneo de Integridad Total...");
                let anomalies = 0;
                
                for (let idx = 0; idx < this.blobs.length; idx++) {
                    let buf = this.blobs[idx];
                    for (let i = 0; i < buf.length; i++) {
                        // Buscamos cualquier cosa que no sea nuestro spray ni cero
                        if (buf[i] !== 0x41414141 && buf[i] !== 0) {
                            this.log(`!!! ANOMALÍA: Bloque ${idx}, Offset ${i} -> Valor: 0x${buf[i].toString(16)}`);
                            anomalies++;
                        }
                    }
                    if (idx % 20 === 0) await new Promise(r => setTimeout(r, 1));
                }
                this.log(anomalies === 0 ? "✗ Memoria íntegra. No hay fugas." : `✓ ¡ANOMALÍAS DETECTADAS: ${anomalies}!`);
            },

            // 5. Caos JIT: Intento de confusión de tipos
            jitChaos: function() {
                this.log("Iniciando Caos de Optimización JIT...");
                
                function compiler(obj, mode) {
                    if (mode === "math") return obj.val + 0.5;
                    return obj.val;
                }

                let num = { val: 1.1 };
                let ptr = { val: { a: 1 } };

                // Entrenamos al compilador JIT con números
                for(let i=0; i<100000; i++) { compiler(num, "math"); }

                // Cambio repentino de tipo para buscar el error lógico
                try {
                    let res = compiler(ptr, "leak");
                    this.log("Resultado JIT: " + res);
                    if (typeof res === 'number' && res > 1000) {
                        this.log("!!! POSIBLE DIRECCIÓN LEKEADA POR JIT: " + res);
                    }
                } catch(e) {
                    this.log("Motor estable: " + e.message);
                }
            }
        };

        window.onload = () => {
            Lab.log("Laboratorio V3.0 Cargado.");
            Lab.log("UA: " + navigator.userAgent);
        };
    </script>
</body>
</html>
