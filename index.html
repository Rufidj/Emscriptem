<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS5 File Explorer</title>
    <style>
        body {
            font-family: monospace;
            background: #000;
            color: #0f0;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 { color: #0f0; border-bottom: 2px solid #0f0; padding-bottom: 10px; }
        .status { padding: 10px; margin: 10px 0; border: 1px solid #0f0; }
        .status.error { border-color: #f00; color: #f00; }
        .status.success { border-color: #0f0; color: #0f0; }
        .status.info { border-color: #0ff; color: #0ff; }
        #log { 
            border: 1px solid #0f0; 
            padding: 15px; 
            height: 400px; 
            overflow-y: auto; 
            background: #111;
            margin: 20px 0;
            white-space: pre-wrap;
            word-break: break-all;
        }
        button { 
            background: #0f0; 
            color: #000; 
            padding: 10px 20px; 
            border: none; 
            cursor: pointer; 
            margin: 5px;
            font-weight: bold;
        }
        button:hover { background: #00ff00; }
        .button-group { margin: 20px 0; }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #222;
            color: #0f0;
            border: 1px solid #0f0;
            font-family: monospace;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        table td, table th {
            border: 1px solid #0f0;
            padding: 8px;
            text-align: left;
        }
        table th {
            background: #0f0;
            color: #000;
            font-weight: bold;
        }
        .file { cursor: pointer; color: #0f0; }
        .file:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>🎮 PS5 File Explorer (Jailbreak Edition)</h1>
    
    <div class="status info">
        Intento de lectura de archivos del sistema PS5 desde el navegador
    </div>

    <div class="button-group">
        <button onclick="explorarRaiz()">Explorar /</button>
        <button onclick="explorarDev()">Explorar /dev</button>
        <button onclick="explorarHome()">Explorar /home</button>
        <button onclick="explorarTmp()">Explorar /tmp</button>
        <button onclick="explorarSys()">Explorar /sys</button>
        <button onclick="explorarProc()">Explorar /proc</button>
        <button onclick="testWebAssembly()">Test WebAssembly</button>
        <button onclick="limpiarLog()">Limpiar Log</button>
    </div>

    <div>
        <input type="text" id="pathInput" placeholder="Ingresa una ruta personalizada ej: /mnt/usb, /media, etc">
        <button onclick="explorarRuta()">Explorar Ruta</button>
    </div>

    <div id="log">Iniciando explorador de archivos PS5...</div>

    <script src="explorer.js"></script>
</body>
</html>
