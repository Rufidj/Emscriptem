<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PS5 Research Lab v4.0 - Fragmentation Suite</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        #log { 
            background: #050505; border: 1px solid #00ff41; height: 400px; 
            overflow-y: scroll; padding: 15px; margin-bottom: 20px;
            white-space: pre-wrap; font-size: 11px; color: #0f0;
            box-shadow: inset 0 0 10px #00ff4155;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { 
            background: #111; color: #00ff41; border: 1px solid #00ff41; 
            padding: 12px; cursor: pointer; font-weight: bold; font-size: 11px;
            text-transform: uppercase;
        }
        button:hover { background: #00ff41; color: #000; }
        .version-tag { color: #444; font-size: 10px; text-align: right; }
        .warning { color: #ff0; font-size: 10px; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h2>🎮 PS5 WEBKIT LAB v4.0</h2>
    <div class="warning">ESTRATEGIA: Fragmentación de Heap para forzar colisiones de sistema.</div>
    <div id="log">>> Suite v4.0 lista...</div>

    <div class="grid">
        <button onclick="Lab.fragmentedSpray()">1. FRAGMENTED SPRAY (Grooming)</button>
        <button onclick="Lab.internalStress()" style="color:#ff0">2. SYSTEM STRESS (CPU/DOM)</button>
        <button onclick="Lab.leakCheck()">3. INTEGRITY CHECK (Anomalías)</button>
        <button onclick="Lab.timingAttack()">4. TIMING SIDE-CHANNEL</button>
        <button onclick="Lab.jitChaos()">5. JIT OPTIMIZATION TEST</button>
        <button onclick="Lab.forceOOB()">6. OOB BUFFER TEST</button>
        <button onclick="Lab.clearLog()">LIMPIAR LOGS</button>
        <button onclick="location.reload()" style="border-color:#f00; color:#f00;">RECARGA FORZADA</button>
    </div>
    
    <div class="version-tag">Build: 2026-04-13_V4.0_GROOMING</div>

    <script src="coi-serviceworker.js"></script>

    <script>
        const Lab = {
            blobs: [],
            
            log: function(msg) {
                const l = document.getElementById('log');
                l.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
                l.scrollTop = l.scrollHeight;
            },

            clearLog: function() { document.getElementById('log').textContent = ""; },

            // 1. Fragmented Spray (Heap Grooming)
            // Llenamos la RAM y luego borramos bloques alternos para crear "huecos"
            fragmentedSpray: async function() {
                this.log("Iniciando Heap Grooming (Creando huecos en RAM)...");
                try {
                    this.blobs = [];
                    for(let i=0; i<400; i++) {
                        let b = new Uint32Array(1024 * 256); 
                        // Cada bloque tiene una marca única: 0xAAAA0000 + ID del bloque
                        b.fill(0xAAAA0000 + i); 
                        this.blobs.push(b);
                    }
                    this.log("✓ Fase 1: 400MB inyectados.");
                    
                    // BORRADO SELECTIVO: Borramos 1 de cada 2 bloques para fragmentar
                    this.log("Fase 2: Fragmentando (Liberando bloques pares)...");
                    for(let i=0; i < this.blobs.length; i += 2) {
                        this.blobs[i] = null;
                    }
                    this.log("✓ Fase 2: Huecos creados. El sistema intentará llenarlos.");
                } catch(e) { this.log("✗ Error: " + e.message); }
            },

            // 2. Estrés del sistema
            internalStress: function() {
                this.log("Lanzando procesos de estrés...");
                // CPU Workers
                for(let i=0; i<4; i++) {
                    const b = new Blob(["setInterval(()=>{let x=0;for(let i=0;i<1e6;i++){x+=Math.sqrt(i)}},30)"], {type:'text/javascript'});
                    new Worker(URL.createObjectURL(b));
                }
                // DOM Stress
                const c = document.createElement('div');
                c.style.display = 'none';
                document.body.appendChild(c);
                for(let i=0; i<8000; i++) {
                    const s = document.createElement('span');
                    s.id = "node_" + i;
                    c.appendChild(s);
                }
                this.log("✓ CPU y DOM bajo presión máxima.");
                this.log("SUGERENCIA: Abre el Control Center (botón PS) ahora.");
            },

            // 3. Integrity Check (Sensible a la fragmentación)
            leakCheck: async function() {
                this.log("Escaneando huecos en busca de datos infiltrados...");
                let found = 0;
                for (let idx = 0; idx < this.blobs.length; idx++) {
                    if (!this.blobs[idx]) continue; // Saltamos los huecos vacíos
                    
                    let buf = this.blobs[idx];
                    let pattern = 0xAAAA0000 + idx;
                    
                    for (let i = 0; i < 500; i++) {
                        if (buf[i] !== pattern && buf[i] !== 0) {
                            this.log(`!!! CAMBIO EN BLOQUE ${idx}: 0x${buf[i].toString(16)}`);
                            found++;
                        }
                    }
                    if (idx % 50 === 0) await new Promise(r => setTimeout(r, 1));
                }
                this.log(found === 0 ? "Resultado: Memoria estable (Sin colisiones)." : `ÉXITO: ${found} anomalías.`);
            },

            // 4. Timing Side-Channel (Experimental)
            // Mide si el acceso a ciertas partes de la RAM es sospechosamente lento
            timingAttack: async function() {
                this.log("Iniciando medición de latencia de acceso...");
                if (!this.blobs[1]) { this.log("✗ Primero haz el Spray."); return; }
                
                let results = [];
                for (let idx = 1; idx < this.blobs.length; idx += 2) {
                    if (!this.blobs[idx]) continue;
                    let start = performance.now();
                    let sum = 0;
                    for(let i=0; i<100000; i++) { sum += this.blobs[idx][i % 1000]; }
                    let end = performance.now();
                    results.push(end - start);
                }
                let avg = results.reduce((a,b) => a+b) / results.length;
                this.log(`Latencia Media: ${avg.toFixed(4)}ms`);
                this.log("Si una zona tarda > 2x la media, hay protección activa.");
            },

            jitChaos: function() { /* ... código anterior optimizado ... */ },
            forceOOB: function() { /* ... código anterior optimizado ... */ }
        };

        window.onload = () => Lab.log("Laboratorio V4.0 Cargado.");
    </script>
</body>
</html>
